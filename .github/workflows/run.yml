name: Dice Arena Speedrun

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Qo'lda ishga tushirish uchun

jobs:
  exploit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Speedrun Script
        run: python speedrun.py
